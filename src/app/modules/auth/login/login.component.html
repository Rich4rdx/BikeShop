<div class="login-bg">
  <div class="animated-bg">
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>
    <div class="bg-circle c3"></div>
    <div class="bike-track">
      <mat-icon class="moving-bike">directions_bike</mat-icon>
    </div>
  </div>

  <div class="overlay"></div>

  <div class="login-wrapper">
    <div class="brand">
      <div class="logo-circle">
        <mat-icon class="bike-icon">directions_bike</mat-icon>
      </div>
      <h1>BikeShop</h1>
      <p>Sistema de Gestión de Tienda</p>
    </div>

    <mat-card class="login-card">
      <div class="tab-content">
        <h2>Iniciar Sesión</h2>
        <p class="subtitle">Ingresa tus credenciales para acceder al sistema</p>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
          <mat-form-field appearance="outline">
            <mat-label>Usuario</mat-label>
            <input matInput formControlName="username" placeholder="usuario" autocomplete="username">
            <mat-icon matSuffix>person</mat-icon>
            <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
              El usuario es obligatorio
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Contraseña</mat-label>
            <input matInput formControlName="password"
                   [type]="hidePassword ? 'password' : 'text'"
                   autocomplete="current-password">
            <button mat-icon-button matSuffix type="button"
                    (click)="hidePassword = !hidePassword">
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
              La contraseña es obligatoria
            </mat-error>
          </mat-form-field>

          <button mat-raised-button class="btn-primary btn-full"
                  type="submit" [disabled]="loading">
            <mat-icon *ngIf="!loading">login</mat-icon>
            <mat-spinner *ngIf="loading" diameter="20" color="accent"></mat-spinner>
            {{ loading ? 'Ingresando...' : 'Iniciar Sesión' }}
          </button>
        </form>
      </div>
    </mat-card>

    <p class="footer-text">Sistema de gestión para tiendas de bicicletas</p>
  </div>
</div>
